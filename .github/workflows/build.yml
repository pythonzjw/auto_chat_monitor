name: Build APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          KS_PATH="$GITHUB_WORKSPACE/release.keystore"

          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$KS_PATH"
            # 自动检测 alias
            ALIAS=$(keytool -list -keystore "$KS_PATH" -storepass "$KEYSTORE_PASSWORD" 2>/dev/null \
              | grep "PrivateKeyEntry\|SecretKeyEntry" | head -1 | cut -d',' -f1 | xargs)
            if [ -z "$ALIAS" ]; then
              echo "无法从已有 keystore 中检测到 alias，重新生成"
              rm -f "$KS_PATH"
            else
              echo "KEY_ALIAS=$ALIAS" >> $GITHUB_ENV
              echo "检测到 alias: $ALIAS"
              exit 0
            fi
          fi

          # 生成新 keystore
          keytool -genkeypair \
            -alias wework \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -keystore "$KS_PATH" \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEYSTORE_PASSWORD" \
            -dname "CN=WeworkForwarder, O=Dev, C=CN" \
            -noprompt
          echo "KEY_ALIAS=wework" >> $GITHUB_ENV
          echo "生成新 keystore，alias=wework"

          # 重要：将新 keystore 的 base64 输出，方便用户保存到 Secret
          echo "==== 请将以下内容保存到 GitHub Secret KEYSTORE_BASE64 以保持签名一致 ===="
          base64 "$KS_PATH" | head -5
          echo "... (截断显示)"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
        working-directory: android/WeworkForwarder

      - name: Build APK
        working-directory: android/WeworkForwarder
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Verify APK
        run: |
          APK_PATH="android/WeworkForwarder/app/build/outputs/apk/release/app-release.apk"
          ls -lh "$APK_PATH"

      - name: Create Release and Upload APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          APK_PATH="android/WeworkForwarder/app/build/outputs/apk/release/app-release.apk"
          cp "$APK_PATH" wework-forwarder.apk

          gh release create "$TAG_NAME" \
            --title "企微消息转发 $TAG_NAME" \
            --notes "## 企微消息采集转发工具（原生 Android 版）

          ### 安装说明
          1. 下载 \`wework-forwarder.apk\` 安装到 Android 手机
          2. 打开应用，点击「去开启」进入无障碍服务设置
          3. 找到「企微消息转发」并开启
          4. 返回应用，填写源群名称和目标群名称
          5. 点击「启动采集」

          ### 前提条件
          - 企业微信已登录
          - 手机屏幕保持常亮
          - 已授予无障碍服务权限

          ### 更新日志
          - 原生 Android 重构版本 $TAG_NAME
          - 标准 Gradle 构建，APK 约 5MB
          - AccessibilityService 直接读取控件树" \
            wework-forwarder.apk
