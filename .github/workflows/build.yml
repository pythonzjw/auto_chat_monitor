name: Build APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download AutoJs6 APK template
        run: |
          wget -q "https://github.com/SuperMonster003/AutoJs6/releases/download/v6.7.0/autojs6-v6.7.0-universal-047ae62e.apk" -O autojs6.apk
          ls -lh autojs6.apk

      - name: Download ApkBuilder CLI
        run: |
          wget -q "https://github.com/Steven-Qiang/AutoJs6-ApkBuilder/releases/download/v1.1.0/apkbuilder-cli.jar" -O apkbuilder-cli.jar
          ls -lh apkbuilder-cli.jar

      - name: Build APK
        run: |
          java -jar apkbuilder-cli.jar \
            -a autojs6.apk \
            -s . \
            -o wework-collector.apk

      - name: Fix APK (native libs + plaintext JS + re-sign)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)

          # ===== 1. 注入模板 APK 中所有 native library（修复 .so 缺失） =====
          unzip -o autojs6.apk "lib/*" -d template_libs/
          cd template_libs
          find lib -name "*.so" -exec zip -u -0 ../wework-collector.apk {} +
          cd ..

          # ===== 2. 用明文 JS 替换 ApkBuilder 加密的 JS（修复解密失败） =====
          # ApkBuilder 对 JS 做了 AES 加密，但加密/解密密钥链路存在 bug
          # AutoJs6 引擎支持直接执行明文 JS（检测到无加密文件头就走明文路径）
          # 所以直接把明文源码写入 assets/project/ 即可

          # 删除 APK 中 ApkBuilder 写入的加密 JS
          zip -d wework-collector.apk "assets/project/*.js" || true
          zip -d wework-collector.apk "assets/project/modules/*.js" || true

          # 写入明文 JS 源码（路径必须从 assets/ 开始，和 APK 内部结构一致）
          mkdir -p assets/project/modules
          cp main.js config.js assets/project/
          cp modules/*.js assets/project/modules/
          find assets/project -name "*.js" -exec zip -u wework-collector.apk {} +

          # ===== 2.5 从模板 APK 恢复 assets/modules/ 引擎内部文件 =====
          # ApkBuilder 可能修改/损坏了引擎内部模块（如 js_object_observe_lite_min）
          # 导致 ScriptRuntime.initEpilogue 崩溃：kotlin.Unit cannot be cast to BaseFunction
          # 用原始模板 APK 中的 assets/modules/ 覆盖回去
          unzip -o autojs6.apk "assets/modules/*" -d template_assets/
          cd template_assets
          find assets/modules -type f -exec zip -u ../wework-collector.apk {} +
          cd ..

          # 验证 APK 中的文件路径
          echo "=== APK 中 assets/project/ 下的文件 ==="
          zipinfo wework-collector.apk "assets/project/*" 2>/dev/null || true
          echo "=== APK 中 assets/modules/ 下的文件 ==="
          zipinfo wework-collector.apk "assets/modules/*" 2>/dev/null || true

          # ===== 3. 删除旧签名 =====
          zip -d wework-collector.apk "META-INF/*" || true

          # ===== 4. 页面对齐 =====
          ${BUILD_TOOLS}zipalign -p -f 4 wework-collector.apk wework-collector-aligned.apk
          mv wework-collector-aligned.apk wework-collector.apk

          # ===== 5. 用固定 keystore 签名（支持覆盖安装） =====
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          ${BUILD_TOOLS}apksigner sign \
            --ks release.keystore \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --key-pass "pass:$KEYSTORE_PASSWORD" \
            wework-collector.apk

          echo "修复完成"

      - name: Verify APK
        run: |
          ls -lh wework-collector.apk
          file wework-collector.apk

      - name: Create Release and Upload APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG_NAME" \
            --title "企微消息采集 $TAG_NAME" \
            --notes "## 企微消息采集转发工具

          ### 安装说明
          1. 下载 \`wework-collector.apk\` 安装到 Android 手机
          2. 授予**无障碍服务**权限和**悬浮窗**权限
          3. 打开应用，点击[启动]，首次运行弹窗填写群信息
          4. 配置自动保存，下次启动直接运行

          ### 前提条件
          - 企业微信已登录
          - 手机屏幕保持常亮
          - 已授予无障碍服务权限和悬浮窗权限

          ### 更新日志
          - 自动构建版本 $TAG_NAME" \
            wework-collector.apk
