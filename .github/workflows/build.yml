name: Build APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download AutoJs6 APK template
        run: |
          wget -q "https://github.com/SuperMonster003/AutoJs6/releases/download/v6.7.0/autojs6-v6.7.0-universal-047ae62e.apk" -O autojs6.apk
          ls -lh autojs6.apk

      - name: Download ApkBuilder CLI
        run: |
          wget -q "https://github.com/Steven-Qiang/AutoJs6-ApkBuilder/releases/download/v1.1.0/apkbuilder-cli.jar" -O apkbuilder-cli.jar
          ls -lh apkbuilder-cli.jar

      - name: Build APK
        run: |
          java -jar apkbuilder-cli.jar \
            -a autojs6.apk \
            -s . \
            -o wework-collector.apk

      - name: Fix APK (native libs + plaintext JS + re-sign)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)

          # ===== 1. 注入模板 APK 中所有 native library（修复 .so 缺失） =====
          unzip -o autojs6.apk "lib/*" -d template_libs/
          cd template_libs
          find lib -name "*.so" -exec zip -u -0 ../wework-collector.apk {} +
          cd ..

          # ===== 2. 用明文 JS 替换 ApkBuilder 加密的 JS（修复解密失败） =====
          # ApkBuilder 做了两件事：
          #   a) 把用户脚本加密后放到 assets/project/{main.js,config.js,modules/*.js}
          #   b) 把模板 APK 的整个 assets/ 拷贝到 assets/project/temp/assets/
          # 所以不能用通配符 "assets/project/*.js"（会递归删除 temp/ 下 140+ 个文件）
          #
          # 策略：精确删除 → 清理 temp → 写入明文 → 恢复引擎文件

          # 2a. 精确删除 ApkBuilder 加密的用户脚本（逐个列出，不用通配符）
          zip -d wework-collector.apk \
            "assets/project/main.js" \
            "assets/project/config.js" \
            "assets/project/inspect.js" \
            "assets/project/modules/collector.js" \
            "assets/project/modules/forwarder.js" \
            "assets/project/modules/navigator.js" \
            "assets/project/modules/ocr.js" \
            "assets/project/modules/storage.js" \
            "assets/project/modules/utils.js" \
            || true

          # 2b. 删除 ApkBuilder 拷贝的无用模板副本（整个 temp 目录）
          zip -d wework-collector.apk "assets/project/temp/*" || true

          # 2c. 写入明文 JS 源码
          mkdir -p assets/project/modules
          cp main.js config.js assets/project/
          cp modules/*.js assets/project/modules/
          [ -f inspect.js ] && cp inspect.js assets/project/
          cd assets
          find project -type f -exec zip ../wework-collector.apk {} +
          cd ..

          # 2d. 从模板 APK 恢复引擎内部文件（assets/modules/ 等）
          # ApkBuilder 可能损坏了这些文件，导致 ScriptRuntime 初始化崩溃：
          #   kotlin.Unit cannot be cast to BaseFunction (js_object_observe_lite_min)
          unzip -o autojs6.apk "assets/modules/*" "assets/init.js" "assets/js-beautify/*" "assets/web/*" -d template_assets/ 2>/dev/null || true
          cd template_assets
          find assets -type f -exec zip ../wework-collector.apk {} +
          cd ..

          # 2e. 验证关键文件
          echo "=== 用户脚本 ==="
          zipinfo wework-collector.apk "assets/project/main.js" "assets/project/config.js" "assets/project/modules/utils.js" 2>/dev/null || true
          echo "=== 引擎核心模块 ==="
          zipinfo wework-collector.apk "assets/modules/object-observe-lite.min.js" "assets/modules/internal.js" "assets/init.js" 2>/dev/null || true
          echo "=== 确认 temp 已清理 ==="
          zipinfo wework-collector.apk "assets/project/temp/*" 2>/dev/null && echo "WARNING: temp still exists!" || echo "OK: temp cleaned"

          # ===== 3. 删除旧签名 =====
          zip -d wework-collector.apk "META-INF/*" || true

          # ===== 4. 页面对齐 =====
          ${BUILD_TOOLS}zipalign -p -f 4 wework-collector.apk wework-collector-aligned.apk
          mv wework-collector-aligned.apk wework-collector.apk

          # ===== 5. 用固定 keystore 签名（支持覆盖安装） =====
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          ${BUILD_TOOLS}apksigner sign \
            --ks release.keystore \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --key-pass "pass:$KEYSTORE_PASSWORD" \
            wework-collector.apk

          echo "修复完成"

      - name: Verify APK
        run: |
          ls -lh wework-collector.apk
          file wework-collector.apk

      - name: Create Release and Upload APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG_NAME" \
            --title "企微消息采集 $TAG_NAME" \
            --notes "## 企微消息采集转发工具

          ### 安装说明
          1. 下载 \`wework-collector.apk\` 安装到 Android 手机
          2. 授予**无障碍服务**权限和**悬浮窗**权限
          3. 打开应用，点击[启动]，首次运行弹窗填写群信息
          4. 配置自动保存，下次启动直接运行

          ### 前提条件
          - 企业微信已登录
          - 手机屏幕保持常亮
          - 已授予无障碍服务权限和悬浮窗权限

          ### 更新日志
          - 自动构建版本 $TAG_NAME" \
            wework-collector.apk
