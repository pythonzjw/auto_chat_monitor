name: Build APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download AutoJs6 APK template
        run: |
          wget -q "https://github.com/SuperMonster003/AutoJs6/releases/download/v6.7.0/autojs6-v6.7.0-universal-047ae62e.apk" -O autojs6.apk
          ls -lh autojs6.apk

      - name: Download ApkBuilder CLI
        run: |
          wget -q "https://github.com/Steven-Qiang/AutoJs6-ApkBuilder/releases/download/v1.1.0/apkbuilder-cli.jar" -O apkbuilder-cli.jar
          ls -lh apkbuilder-cli.jar

      - name: Build APK
        run: |
          java -jar apkbuilder-cli.jar \
            -a autojs6.apk \
            -s . \
            -o wework-collector.apk

      - name: Fix native libraries and re-sign with release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          # ApkBuilder 打包时会遗漏部分 .so 文件（如 libjackpal-termexec2.so）
          # 从模板 APK 中提取所有 native library 并注入到打包后的 APK 中

          # 1. 提取模板 APK 中所有 .so 文件
          unzip -o autojs6.apk "lib/*" -d template_libs/
          echo "模板 APK 中的 .so 文件:"
          find template_libs/lib -name "*.so" | head -50

          # 2. 以不压缩方式注入到打包后的 APK（Android 要求 .so 以 STORED 方式存储）
          cd template_libs
          find lib -name "*.so" -exec zip -u -0 ../wework-collector.apk {} +
          cd ..

          # 3. 删除旧签名（修改了 APK 内容后签名失效）
          zip -d wework-collector.apk "META-INF/*" || true

          # 4. 页面对齐（.so 文件必须 4KB 对齐）
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
          ${BUILD_TOOLS}zipalign -p -f 4 wework-collector.apk wework-collector-aligned.apk
          mv wework-collector-aligned.apk wework-collector.apk

          # 5. 从 Secrets 还原固定 keystore 并签名（确保每次构建签名一致，支持覆盖安装）
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          ${BUILD_TOOLS}apksigner sign \
            --ks release.keystore \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --key-pass "pass:$KEYSTORE_PASSWORD" \
            wework-collector.apk

          echo "修复完成，使用固定 release keystore 签名"

      - name: Verify APK
        run: |
          ls -lh wework-collector.apk
          file wework-collector.apk

      - name: Create Release and Upload APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG_NAME" \
            --title "企微消息采集 $TAG_NAME" \
            --notes "## 企微消息采集转发工具

          ### 安装说明
          1. 下载 \`wework-collector.apk\` 安装到 Android 手机
          2. 打开应用，授予**无障碍服务**权限
          3. 填写源群名称和目标群名称
          4. 点击「启动采集」

          ### 前提条件
          - 企业微信已登录
          - 手机屏幕保持常亮
          - 已授予无障碍服务权限

          ### 更新日志
          - 自动构建版本 $TAG_NAME" \
            wework-collector.apk
