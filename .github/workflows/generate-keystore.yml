name: Generate Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore and output base64
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          keytool -genkeypair -keystore release.keystore \
            -storepass "$KS_PASS" -alias key -keypass "$KS_PASS" \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -dname "CN=WeworkCollector"
          echo "KEYSTORE_BASE64_START"
          base64 -w 0 release.keystore
          echo ""
          echo "KEYSTORE_BASE64_END"
